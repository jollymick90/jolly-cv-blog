<!doctype html>
<html lang="en" class="h-full antialiased" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
		<link rel="preload" href="/fonts/plus-jakarta-sans-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
		<style>
			@font-face {
				font-family: 'Inter';
				font-style: normal;
				font-weight: 400 600;
				font-display: swap;
				src: url('/fonts/inter-latin.woff2') format('woff2');
				unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
			}
			@font-face {
				font-family: 'Plus Jakarta Sans';
				font-style: normal;
				font-weight: 700 800;
				font-display: swap;
				src: url('/fonts/plus-jakarta-sans-latin.woff2') format('woff2');
				unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
			}
		</style>
		<script>
			(function() {
				var t = localStorage.getItem('theme');
				if (t === 'light' || t === 'dark') {
					document.documentElement.setAttribute('data-theme', t);
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body class="flex flex-col min-h-screen bg-background text-on-background font-body selection:bg-tertiary selection:text-on-tertiary"
	 	data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
